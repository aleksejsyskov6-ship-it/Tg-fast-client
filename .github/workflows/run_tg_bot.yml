name: 'Run TG Client'
on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Debug - Show main.py content
        run: |
          echo "=== Content of main.py ==="
          head -n 10 main.py
          echo "=== End of main.py ==="
          
      - name: Install Dependencies
        run: pip install --upgrade --force-reinstall telethon cryptg
        
      - name: Run Bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
        run: python main.py
