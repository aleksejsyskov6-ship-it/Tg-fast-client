name: 'Run TG Client'
on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (with cache clear)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true
          ref: main
          
      - name: Show git log
        run: git log --oneline -3
        
      - name: Display main.py content
        run: |
          echo "=== main.py content ==="
          head -20 main.py
          echo "=== End of main.py ==="
          
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Clear pip cache
        run: pip cache purge
        
      - name: Install Dependencies fresh
        run: |
          pip install --no-cache-dir --upgrade telethon cryptg
        
      - name: Run Bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          PHONE: ${{ secrets.PHONE }}
        run: python main.py
